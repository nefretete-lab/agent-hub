<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Agent Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #e8e8f0;
    --text-dim: #6a6a80;
    --user-bubble: #1e1e30;
    --agent-bubble: #16162a;
    --success: #6af7a0;
    --recording: #f76a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── PIN SCREEN ── */
  #pin-screen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px;
    animation: fadeIn .4s ease;
  }

  .pin-logo {
    font-size: 13px;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .pin-title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -.02em;
    text-align: center;
  }

  .pin-dots {
    display: flex; gap: 14px;
  }

  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: all .2s;
  }

  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .pin-dot.error {
    background: var(--accent2);
    border-color: var(--accent2);
    animation: shake .3s ease;
  }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 240px;
  }

  .pin-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    padding: 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }

  .pin-btn:active {
    background: var(--surface2);
    transform: scale(.95);
    border-color: var(--accent);
  }

  .pin-btn.del {
    font-size: 16px;
    color: var(--text-dim);
  }

  /* ── MAIN APP ── */
  #app {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }

  #app.visible { display: flex; animation: fadeIn .4s ease; }

  /* Header */
  .header {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left {
    display: flex; align-items: center; gap: 10px;
  }

  .agent-indicator {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
  }

  .agent-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .02em;
  }

  .agent-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: .05em;
  }

  /* Response type toggle (text/voice) */
  .mode-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }

  .mode-btn {
    padding: 6px 14px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .03em;
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 0 12px rgba(124,106,247,.4);
  }

  /* ── LEARNING MODE SELECTOR ── */
  .learning-modes {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }

  .learning-modes::-webkit-scrollbar { display: none; }

  .lmode-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: .02em;
  }

  .lmode-btn:active { transform: scale(.96); }

  .lmode-btn.active {
    color: white;
    border-color: transparent;
  }

  .lmode-btn[data-mode="powtorka"].active {
    background: #4f7af7;
    box-shadow: 0 0 12px rgba(79,122,247,.35);
  }

  .lmode-btn[data-mode="pytanie"].active {
    background: #f7a84f;
    box-shadow: 0 0 12px rgba(247,168,79,.35);
  }

  .lmode-btn[data-mode="newsy"].active {
    background: #6af7a0;
    color: #0a0a0f;
    box-shadow: 0 0 12px rgba(106,247,160,.35);
  }

  .lmode-btn[data-mode="nauka"].active {
    background: #f76af7;
    box-shadow: 0 0 12px rgba(247,106,247,.35);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn .25s ease;
  }

  .msg.user { align-items: flex-end; }
  .msg.agent { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 0 6px;
  }

  .msg-bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
  }

  .msg.agent .msg-bubble {
    background: var(--agent-bubble);
    border: 1px solid rgba(124,106,247,.2);
    border-bottom-left-radius: 4px;
  }

  .msg-tags {
    display: flex;
    gap: 4px;
    margin-bottom: 2px;
    align-self: flex-end;
  }

  .msg-tag {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* ── SYSTEM MESSAGE (zmiana trybu) ── */
  .msg-system {
    display: flex;
    justify-content: center;
    animation: msgIn .25s ease;
  }

  .msg-system-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid var(--border);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    letter-spacing: .04em;
  }

  .msg-system-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    opacity: .5;
  }

  /* Typing indicator */
  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 16px;
    background: var(--agent-bubble);
    border: 1px solid rgba(124,106,247,.2);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }

  /* Input area */
  .input-area {
    padding: 12px 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  /* TEXT MODE */
  #text-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #text-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    outline: none;
    transition: border-color .2s;
    line-height: 1.5;
  }

  #text-input:focus { border-color: var(--accent); }
  #text-input::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    box-shadow: 0 0 16px rgba(124,106,247,.3);
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 24px rgba(124,106,247,.5); }
  .send-btn:active { transform: scale(.95); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* VOICE MODE */
  #voice-input-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
  }

  #record-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    border: 2px solid var(--border);
    color: var(--text);
    font-size: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    position: relative;
  }

  #record-btn.recording {
    background: var(--recording);
    border-color: var(--recording);
    box-shadow: 0 0 0 0 rgba(247,106,106,.4);
    animation: recordPulse 1.2s infinite;
  }

  #record-btn:disabled { opacity: .4; cursor: not-allowed; animation: none; }

  .voice-status {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: .05em;
    text-align: center;
    min-height: 18px;
  }

  .voice-status.recording { color: var(--recording); }
  .voice-status.processing { color: var(--accent); }

  .transcript-box {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    min-height: 40px;
    display: none;
  }

  .transcript-box.visible { display: block; }

  /* Welcome */
  .welcome {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; flex: 1;
    color: var(--text-dim);
    text-align: center;
    padding: 40px 20px;
  }

  .welcome-icon { font-size: 40px; opacity: .4; }
  .welcome-text { font-size: 13px; line-height: 1.7; max-width: 260px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  @keyframes recordPulse {
    0% { box-shadow: 0 0 0 0 rgba(247,106,106,.4); }
    70% { box-shadow: 0 0 0 16px rgba(247,106,106,0); }
    100% { box-shadow: 0 0 0 0 rgba(247,106,106,0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">Agent Hub</div>
  <div class="pin-title">Wprowadź PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn del" onclick="pinPress('del')">⌫</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinPress('clr')">✕</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="agent-indicator"></div>
      <div>
        <div class="agent-name">AI Mentor</div>
        <div class="agent-sub">LLM · AI · Machine Learning</div>
      </div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-text" onclick="setResponseType('text')">✏️ Czat</button>
      <button class="mode-btn" id="btn-voice" onclick="setResponseType('voice')">🎙️ Głos</button>
    </div>
  </div>

  <!-- LEARNING MODE SELECTOR -->
  <div class="learning-modes">
    <button class="lmode-btn active" data-mode="powtorka" onclick="setLearningMode('powtorka')">
      🔁 Powtórka
    </button>
    <button class="lmode-btn" data-mode="pytanie" onclick="setLearningMode('pytanie')">
      ❓ Pytanie
    </button>
    <button class="lmode-btn" data-mode="newsy" onclick="setLearningMode('newsy')">
      📰 Newsy
    </button>
    <button class="lmode-btn" data-mode="nauka" onclick="setLearningMode('nauka')">
      🎓 Nauka
    </button>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <div class="welcome-text">Cześć! Jestem Twoim mentorem AI.<br>Wybierz tryb żeby zacząć.</div>
    </div>
  </div>

  <div class="input-area">
    <!-- TEXT MODE -->
    <div id="text-input-row">
      <textarea id="text-input" placeholder="Napisz wiadomość..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendText()">↑</button>
    </div>

    <!-- VOICE MODE -->
    <div id="voice-input-area" style="display:none;">
      <div class="transcript-box" id="transcript-box"></div>
      <button id="record-btn" onclick="toggleRecording()">🎙️</button>
      <div class="voice-status" id="voice-status">Naciśnij żeby nagrać</div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const PIN = '1304';
const WEBHOOK_URL = 'https://leszek181-20181.mikrus.cloud/webhook/mentor-chat';

// Ludzkie opisy trybów — tylko dla użytkownika, wyświetlane jako komunikat systemowy
const MODE_DESCRIPTIONS = {
  powtorka: 'Sprawdź co pamiętasz',
  pytanie:  'Zapytaj o cokolwiek',
  newsy:    'Co słychać w AI?',
  nauka:    'Zacznij nowy temat'
};

// Ukryte triggery — wysyłane do agenta, użytkownik ich nie widzi
const MODE_TRIGGERS = {
  powtorka: 'START_POWTORKA',
  pytanie:  'START_PYTANIE',
  newsy:    'START_NEWSY',
  nauka:    'START_NAUKA'
};

const MODE_EMOJIS = {
  powtorka: '🔁',
  pytanie:  '❓',
  newsy:    '📰',
  nauka:    '🎓'
};

// ── PIN ──
let pinInput = '';

function pinPress(val) {
  if (val === 'del') { pinInput = pinInput.slice(0,-1); }
  else if (val === 'clr') { pinInput = ''; }
  else if (pinInput.length < 4) { pinInput += val; }
  updateDots();
  if (pinInput.length === 4) checkPin();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d'+i);
    d.classList.toggle('filled', i < pinInput.length);
    d.classList.remove('error');
  }
}

function checkPin() {
  if (pinInput === PIN) {
    setTimeout(() => {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 200);
  } else {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('d'+i);
      d.classList.remove('filled');
      d.classList.add('error');
    }
    setTimeout(() => { pinInput = ''; updateDots(); }, 600);
  }
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pin-screen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinPress('del');
});

// ── RESPONSE TYPE (text / voice) ──
let currentResponseType = 'text';

function setResponseType(type) {
  currentResponseType = type;
  document.getElementById('btn-text').classList.toggle('active', type === 'text');
  document.getElementById('btn-voice').classList.toggle('active', type === 'voice');
  document.getElementById('text-input-row').style.display = type === 'text' ? 'flex' : 'none';
  document.getElementById('voice-input-area').style.display = type === 'voice' ? 'flex' : 'none';
}

// ── LEARNING MODE (powtorka / pytanie / newsy / nauka) ──
let currentLearningMode = 'powtorka';

function setLearningMode(mode) {
  currentLearningMode = mode;

  // Aktualizuj przyciski
  document.querySelectorAll('.lmode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  // Pokaż systemowy komunikat o zmianie trybu (nie bańka użytkownika)
  addSystemMessage(`${MODE_EMOJIS[mode]} ${MODE_DESCRIPTIONS[mode]}`);

  // Wyślij ukryty trigger do agenta
  sendToAgent(MODE_TRIGGERS[mode], mode, currentResponseType);
}

// ── MESSAGES ──
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

// Systemowy komunikat o zmianie trybu — subtelny, wyśrodkowany
function addSystemMessage(text) {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.innerHTML = `<div class="msg-system-inner">
    <div class="msg-system-dot"></div>
    ${text}
    <div class="msg-system-dot"></div>
  </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addMessage(text, role, learningMode, responseType) {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  let html = `<div class="msg-label">${role === 'user' ? 'Ty' : 'Mentor'}</div>`;
  if (role === 'user') {
    html += `<div class="msg-tags">
      <span class="msg-tag">${MODE_EMOJIS[learningMode] || ''} ${learningMode}</span>
      ${responseType === 'voice' ? '<span class="msg-tag">🎙️ głos</span>' : ''}
    </div>`;
  }
  html += `<div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  hideWelcome();
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-label">Mentor</div>
    <div class="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ── SEND TO WEBHOOK ──
function getSessionId() {
  let id = localStorage.getItem('agentHubSessionId');
  if (!id) {
    id = 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('agentHubSessionId', id);
  }
  return id;
}

async function sendToAgent(message, learningMode, responseType) {
  showTyping();
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        mode: learningMode,
        responseType,
        sessionId: getSessionId()
      })
    });
    const text = await res.text();
    hideTyping();
    addMessage(text, 'agent', learningMode, responseType);

    if (responseType === 'voice') {
      speakText(text);
    }
  } catch(err) {
    hideTyping();
    addMessage('Błąd połączenia z agentem. Sprawdź czy n8n działa.', 'agent', learningMode, responseType);
  }
}

// ── TEXT MODE ──
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');

textInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

textInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});

async function sendText() {
  const msg = textInput.value.trim();
  if (!msg) return;
  textInput.value = '';
  textInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMessage(msg, 'user', currentLearningMode, currentResponseType);
  await sendToAgent(msg, currentLearningMode, currentResponseType);
  sendBtn.disabled = false;
  textInput.focus();
}

// ── VOICE MODE ──
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

const recordBtn = document.getElementById('record-btn');
const voiceStatus = document.getElementById('voice-status');
const transcriptBox = document.getElementById('transcript-box');

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = processAudio;
    mediaRecorder.start();
    isRecording = true;
    recordBtn.classList.add('recording');
    recordBtn.textContent = '⏹️';
    voiceStatus.textContent = 'Nagrywam... naciśnij żeby skończyć';
    voiceStatus.className = 'voice-status recording';
    transcriptBox.classList.remove('visible');
  } catch(err) {
    voiceStatus.textContent = 'Brak dostępu do mikrofonu';
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    isRecording = false;
    recordBtn.classList.remove('recording');
    recordBtn.textContent = '⏳';
    recordBtn.disabled = true;
    voiceStatus.textContent = 'Przetwarzam...';
    voiceStatus.className = 'voice-status processing';
  }
}

async function processAudio() {
  // Tu docelowo trafi Groq Whisper STT
  voiceStatus.textContent = '⚠️ Groq Whisper — do skonfigurowania';
  voiceStatus.className = 'voice-status';
  transcriptBox.textContent = '[Tu pojawi się transkrypcja po podłączeniu Groq Whisper]';
  transcriptBox.classList.add('visible');
  recordBtn.textContent = '🎙️';
  recordBtn.disabled = false;
  voiceStatus.textContent = 'Naciśnij żeby nagrać';
}

// ── TTS (tymczasowo Web Speech API) ──
function speakText(text) {
  if ('speechSynthesis' in window) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'pl-PL';
    utt.rate = 0.95;
    window.speechSynthesis.speak(utt);
  }
}
